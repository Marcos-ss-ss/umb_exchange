<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>UMB Exchange Login</title>
<link rel="stylesheet" href="login.css">
</head>

<body>

<div class="login-container">

    <!-- LOGO -->
    <a href="index.html" class="logo">
        <img src="umb-logo.png" alt="UMB Logo" class="logo">
    </a>

    <form id="loginForm">
        <input type="email" id="email" placeholder="student@umb.edu" required>
        <button type="submit">Login</button>
    </form>

    <p id="message"></p>
</div>

<script src="login.js"></script>

</body>
</html>
